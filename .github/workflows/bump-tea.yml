name: Bump tea dependency

on:
  schedule:
    - cron: '0 8 * * 1' # every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-tea:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Check for tea update
        id: check
        run: |
          current=$(grep 'code.gitea.io/tea ' go.mod | awk '{print $2}')
          latest=$(go list -m -versions code.gitea.io/tea | tr ' ' '\n' | grep -v '^v1\.3\.3$' | sort -V | tail -1)
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$latest" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          else
            echo "update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update tea dependency
        if: steps.check.outputs.update == 'true'
        run: |
          go get code.gitea.io/tea@${{ steps.check.outputs.latest }}
          go mod tidy

      - name: Verify build
        if: steps.check.outputs.update == 'true'
        run: CGO_ENABLED=0 go build -o extea .

      - name: Commit and push
        if: steps.check.outputs.update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add go.mod go.sum
          git commit -m "deps: bump tea to ${{ steps.check.outputs.latest }}"
          git push

      - name: Tag and dispatch release
        if: steps.check.outputs.update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags
          latest_tag=$(git tag --sort=-v:refname | grep '^v' | head -1)
          major=$(echo "$latest_tag" | cut -d. -f1 | tr -d 'v')
          minor=$(echo "$latest_tag" | cut -d. -f2)
          patch=$(echo "$latest_tag" | cut -d. -f3)
          new_tag="v${major}.${minor}.$((patch + 1))"
          git tag "$new_tag"
          git push origin "$new_tag"
          gh workflow run release.yml --ref "$new_tag"

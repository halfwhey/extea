name: Bump tea dependency

on:
  schedule:
    - cron: '0 8 * * 1' # every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-tea:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Check for tea update
        id: check
        run: |
          current=$(grep 'code.gitea.io/tea ' go.mod | awk '{print $2}')
          latest=$(go list -m -versions code.gitea.io/tea | tr ' ' '\n' | grep -v '\-rc' | tail -1)
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$latest" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          else
            echo "update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update tea dependency
        if: steps.check.outputs.update == 'true'
        run: |
          go get code.gitea.io/tea@${{ steps.check.outputs.latest }}
          go mod tidy

      - name: Verify build
        if: steps.check.outputs.update == 'true'
        run: CGO_ENABLED=0 go build -o extea .

      - name: Commit and push
        if: steps.check.outputs.update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add go.mod go.sum
          git commit -m "deps: bump tea to ${{ steps.check.outputs.latest }}"
          git push

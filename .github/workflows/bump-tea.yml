name: Bump tea dependency

on:
  schedule:
    - cron: '0 8 * * 1' # every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-tea:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v7
        with:
          go-version: stable

      - name: Check for tea update
        id: check
        run: |
          module=code.gitea.io/tea
          current=$(go list -m -f '{{.Version}}' "$module")
          versions=$(go list -m -versions "$module" | cut -d' ' -f2-)
          latest=

          for version in $(printf '%s\n' "$versions" | tr ' ' '\n' | sort -Vr); do
            if [ "$version" = "v1.3.3" ]; then
              continue
            fi

            metadata=$(go mod download -json "$module@$version")
            gomod=$(printf '%s\n' "$metadata" | sed -n 's/^[[:space:]]*"GoMod": "\(.*\)",$/\1/p')
            declared=$(sed -n 's/^module[[:space:]]*//p' "$gomod")
            if [ "$declared" = "$module" ]; then
              latest=$version
              break
            fi
          done

          if [ -z "$latest" ]; then
            echo "No compatible versions found for $module" >&2
            exit 1
          fi

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$latest" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          else
            echo "update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update tea dependency
        if: steps.check.outputs.update == 'true'
        run: |
          go get "code.gitea.io/tea@${{ steps.check.outputs.latest }}"
          go mod tidy

      - name: Verify build
        if: steps.check.outputs.update == 'true'
        run: CGO_ENABLED=0 go build -o "$RUNNER_TEMP/extea" .

      - name: Commit and push
        if: steps.check.outputs.update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add go.mod go.sum
          git commit -m "deps: bump tea to ${{ steps.check.outputs.latest }}"
          git push

      - name: Tag release
        if: steps.check.outputs.update == 'true'
        run: |
          git fetch --tags
          latest_tag=$(git tag --sort=-v:refname | grep '^v' | head -1)
          major=$(echo "$latest_tag" | cut -d. -f1 | tr -d 'v')
          minor=$(echo "$latest_tag" | cut -d. -f2)
          patch=$(echo "$latest_tag" | cut -d. -f3)
          new_tag="v${major}.${minor}.$((patch + 1))"
          git tag "$new_tag"
          git push origin "$new_tag"

      - name: Run goreleaser
        if: steps.check.outputs.update == 'true'
        uses: goreleaser/goreleaser-action@v7
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
